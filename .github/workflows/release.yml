name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Bundle Portable ZIP
        run: |
          mkdir -p JzeroCompilerNativeLite-portable
          cp -rv FastColoredTextBox.dll JzeroCompilerNativeLite.exe README.md gcc screenshots JzeroCompilerNativeLite-portable/
          zip -r JzeroCompilerNativeLite-portable.zip JzeroCompilerNativeLite-portable/

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: JzeroCompilerNativeLite-portable.zip
          body: |
            ### Jzero Compiler Native Lite (Portable)
            This is the official portable distribution bundle.
            
            **Included in this ZIP:**
            - `JzeroCompilerNativeLite.exe` (The main app)
            - `FastColoredTextBox.dll` (Editor engine)
            - `gcc/` folder (Portable compiler)
            - `README.md`
            
            **Instructions:**
            Extract the ZIP and run `JzeroCompilerNativeLite.exe`. Everything is pre-configured to work out of the box.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
